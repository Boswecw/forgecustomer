# cargo-audit configuration. Waivers below MUST carry a justification and are revisited
# whenever the flagged dependency or its parent is upgraded (see docs/SECURITY.md).

[advisories]
ignore = [
    # RUSTSEC-2023-0071 — `rsa` 0.9.x Marvin timing side-channel; no fixed 0.9 release.
    # `rsa` enters Cargo.lock only via `sqlx-mysql`, which this Postgres-only service
    # never enables or compiles (`cargo tree -i rsa` resolves to nothing). The lockfile
    # must still record it because lockfiles cover every feature combination. Remove
    # this waiver when sqlx ships against a fixed `rsa`.
    "RUSTSEC-2023-0071",
]
