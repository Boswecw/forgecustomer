name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all --check
      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --all

  migrations:
    name: migration validation + RLS presence
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      PGPASSWORD: postgres
      PSQL: psql -h localhost -U postgres -v ON_ERROR_STOP=1
    steps:
      - uses: actions/checkout@v4
      - name: Create database + Supabase auth shims
        run: |
          $PSQL -c "create database fc;"
          $PSQL -d fc -c "create schema if not exists auth;"
          $PSQL -d fc -c "create or replace function auth.uid() returns uuid language sql stable as \$\$ select null::uuid \$\$;"
      - name: Apply migrations (first pass)
        run: |
          for f in supabase/migrations/*.sql; do echo "applying $f"; $PSQL -d fc -f "$f"; done
          $PSQL -d fc -f supabase/seed.sql
      - name: Determinism — reapply migrations + seed
        run: |
          for f in supabase/migrations/*.sql; do $PSQL -d fc -f "$f"; done
          $PSQL -d fc -f supabase/seed.sql
      - name: Assert RLS enabled on customer-facing tables
        run: |
          $PSQL -d fc -t -c "select count(*) from pg_tables t join pg_class c on c.relname = t.tablename where t.schemaname='public' and c.relrowsecurity = false;" | tr -d ' ' > /tmp/unprotected
          echo "tables without RLS: $(cat /tmp/unprotected)"
          test "$(cat /tmp/unprotected)" = "0"
      - name: Assert AuthorForge update eligibility matrix
        run: $PSQL -d fc -f supabase/tests/update_eligibility_matrix.sql
      - name: Assert append-only ledgers reject UPDATE
        run: |
          set +e
          $PSQL -d fc -c "insert into customer_profiles(auth_user_id) values (gen_random_uuid());"
          $PSQL -d fc -c "with c as (select id from customer_profiles limit 1) insert into usage_events(customer_id, meter_key, amount, period_key, idempotency_key) select c.id,'cloud_tokens',1,'2026-06','ci' from c;"
          $PSQL -d fc -c "update usage_events set amount = 0;"
          if [ $? -eq 0 ]; then echo "ERROR: usage_events UPDATE should have failed"; exit 1; fi
          echo "append-only enforced"

  release-pipeline-smoke:
    name: release pipeline smoke
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      PGPASSWORD: postgres
      PSQL: psql -h localhost -U postgres -v ON_ERROR_STOP=1
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/fc
      RELEASE_ARTIFACT_BASE_URL: https://downloads.example.test/authorforge
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Create database + Supabase auth shims
        run: |
          $PSQL -c "create database fc;"
          $PSQL -d fc -c "create schema if not exists auth;"
          $PSQL -d fc -c "create or replace function auth.uid() returns uuid language sql stable as \$\$ select null::uuid \$\$;"
      - name: Apply migrations + seed
        run: |
          for f in supabase/migrations/*.sql; do echo "applying $f"; $PSQL -d fc -f "$f"; done
          $PSQL -d fc -f supabase/seed.sql
      - name: Run release package publication smoke
        run: bash scripts/release_pipeline_smoke.sh

  contracts:
    name: OpenAPI + schema validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Validate OpenAPI
        run: npx --yes @redocly/cli@latest lint contracts/openapi.yaml
      - name: Validate JSON schemas parse
        run: |
          for f in contracts/*.schema.json contracts/events/*.schema.json; do
            echo "checking $f"; node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))";
          done

  secret-scan:
    name: secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  audit:
    name: dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo-audit
        run: |
          cargo install cargo-audit --locked
          cargo audit
