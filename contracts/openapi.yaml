openapi: 3.1.0
info:
  title: ForgeCustomer API
  version: 0.1.0
  description: >
    Customer, commerce, licensing, entitlement, installation and usage authority for
    Boswell Digital Solutions products. Customer routes accept Supabase JWTs; admin routes
    require operator JWTs from a separate issuer. See docs/API.md.
servers:
  - url: https://api.forgecustomer.example
    description: production (placeholder)
tags:
  - name: health
  - name: catalog
  - name: account
  - name: subscriptions
  - name: licensing
  - name: entitlements
  - name: usage
  - name: checkout
  - name: webhooks
  - name: admin
paths:
  /v1/health:
    get:
      tags: [health]
      summary: Liveness
      security: []
      responses:
        "200": { description: Process is up }
  /v1/ready:
    get:
      tags: [health]
      summary: Readiness (database reachable)
      security: []
      responses:
        "200": { description: Ready }
        "503": { description: Not ready }
  /v1/version:
    get:
      tags: [health]
      summary: Build/version info
      security: []
      responses:
        "200": { description: Version info }
  /v1/products:
    get:
      tags: [catalog]
      summary: List active products
      security: []
      responses:
        "200": { description: Product list }
  /v1/plans:
    get:
      tags: [catalog]
      summary: List active plans
      security: []
      responses:
        "200": { description: Plan list }
  /v1/account:
    get:
      tags: [account]
      summary: Get own account summary
      responses:
        "200": { description: Account summary }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /v1/account/provision:
    post:
      tags: [account]
      summary: Create or return the caller's ForgeCustomer profile
      description: >
        API-owned profile provisioning for a Supabase-authenticated user. The request may
        supply display/localization decoration only; customer type and commercial status
        are assigned by the server. Repeated calls are idempotent for the same auth user.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AccountProvisionRequest" }
      responses:
        "200":
          description: Provisioned or existing customer profile
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AccountProvisionResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { description: Profile validation failed }
  /v1/subscriptions:
    get:
      tags: [subscriptions]
      summary: Own subscription summary
      responses:
        "401": { $ref: "#/components/responses/Unauthorized" }
  /v1/licenses:
    get:
      tags: [licensing]
      summary: Own licenses (with active device counts)
      responses:
        "200":
          description: License list
          content:
            application/json:
              schema:
                type: object
                required: [licenses]
                properties:
                  licenses:
                    type: array
                    items: { $ref: "#/components/schemas/License" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /v1/installations:
    get:
      tags: [licensing]
      summary: List installations
      responses:
        "200":
          description: Installation list
          content:
            application/json:
              schema:
                type: object
                required: [installations]
                properties:
                  installations:
                    type: array
                    items: { $ref: "#/components/schemas/Installation" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [licensing]
      summary: Register an installation (idempotent by client-supplied install_key)
      description: >
        Registers an installed application instance and, when a device public key is
        supplied, the device identity it runs on. Repeat registration with the same
        install_key returns the existing installation; re-registering a deactivated
        installation reactivates the installation record (license slots are only consumed
        by activation). The client keeps its Ed25519 private key local and registers only
        the public key.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InstallationRegisterRequest" }
      responses:
        "200":
          description: Registered (or existing) installation
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InstallationRegisterResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { description: Unknown or inactive product }
        "409": { description: Install key already registered for a different product }
        "422": { description: Registration validation failed }
  /v1/installations/{id}/activate:
    post:
      tags: [licensing]
      summary: Activate a license on an installation (enforces device limit)
      description: >
        Links the customer's license to the installation. When license_id is omitted the
        most recently issued active license for the installation's product is used.
        Fails closed on suspended/expired/revoked licenses and on explicit revocation
        records; concurrent activations are serialized per license. Idempotent for an
        already-active pairing.
      parameters: [{ $ref: "#/components/parameters/PathId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                license_id:
                  type: ["string", "null"]
                  format: uuid
                  description: Explicit license to activate; defaults to the product's active license.
      responses:
        "200":
          description: Activation result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InstallationActivateResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "402": { description: "Device limit reached (DEVICE_LIMIT_REACHED)" }
        "403": { description: "License not active, or activation blocked by revocation (REVOKED)" }
        "404": { description: "Installation or license not found" }
        "409": { description: "Installation is deactivated; register it again first" }
  /v1/installations/{id}/heartbeat:
    post:
      tags: [licensing]
      summary: Installation heartbeat (liveness; may refresh reported app version)
      parameters: [{ $ref: "#/components/parameters/PathId" }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                app_version: { type: ["string", "null"], maxLength: 64 }
      responses:
        "200":
          description: Heartbeat recorded
          content:
            application/json:
              schema:
                type: object
                required: [installation_id, status]
                properties:
                  installation_id: { type: string, format: uuid }
                  status: { type: string, enum: [active, deactivated] }
                  app_version: { type: ["string", "null"] }
                  last_heartbeat_at: { type: ["string", "null"], format: date-time }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { description: Installation not found }
  /v1/installations/{id}/deactivate:
    post:
      tags: [licensing]
      summary: Deactivate an installation (releases its license activations)
      description: >
        Marks the installation deactivated and releases its active license activations,
        freeing device slots. Idempotent.
      parameters: [{ $ref: "#/components/parameters/PathId" }]
      responses:
        "200":
          description: Deactivation result
          content:
            application/json:
              schema:
                type: object
                required: [installation_id, status, released_activations, already_deactivated]
                properties:
                  installation_id: { type: string, format: uuid }
                  status: { type: string, enum: [deactivated] }
                  released_activations: { type: integer, minimum: 0 }
                  already_deactivated: { type: boolean }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { description: Installation not found }
  /v1/devices:
    get:
      tags: [licensing]
      summary: Own devices
      responses:
        "200":
          description: Device list
          content:
            application/json:
              schema:
                type: object
                required: [devices]
                properties:
                  devices:
                    type: array
                    items: { $ref: "#/components/schemas/Device" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /v1/entitlements/current:
    get:
      tags: [entitlements]
      summary: Current signed entitlement snapshot
      description: >
        Assembles the caller's entitlements from the included-plan baseline, current
        subscription plan, license grants, promotional grants, and admin overrides, with
        cloud features gated by subscription truth and denials failing closed. The
        snapshot is Ed25519-signed and stored for audit/replay before being returned.
        The wire JSON field order matches the canonical signing order.
      parameters:
        - name: product_key
          in: query
          required: false
          schema: { type: string, default: authorforge }
        - name: installation_id
          in: query
          required: false
          description: Bind the snapshot to an owned installation (overrides product_key).
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Signed snapshot
          content:
            application/json:
              schema: { $ref: "./entitlement-v1.schema.json" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { description: "Unknown product, or installation not found" }
        "422": { description: Invalid product key or installation id }
  /v1/entitlements/check:
    post:
      tags: [entitlements]
      summary: Check a specific feature or quota (advisory, read-only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EntitlementCheckRequest" }
      responses:
        "200":
          description: Check result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EntitlementCheckResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { description: Unknown or inactive product }
        "422": { description: "Provide exactly one valid feature_key or quota_key" }
  /v1/entitlements/offline-lease:
    post:
      tags: [entitlements]
      summary: Issue a signed offline lease for an activated installation
      description: >
        Fails closed: requires an active installation holding an active activation on an
        active, unexpired license, with no explicit revocation in scope and a non-revoked
        device. Lease lifetime is the configured offline grace window. Each issued lease
        is stored and audited.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [installation_id]
              properties:
                installation_id: { type: string, format: uuid }
      responses:
        "200":
          description: Signed offline lease (wire field order matches signing order)
          content:
            application/json:
              schema: { $ref: "./lease-v1.schema.json" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: "Suspended customer, non-active license, or revocation (REVOKED) — no new lease" }
        "404": { description: Installation not found }
        "409": { description: "Installation deactivated, or no active activation" }
  /v1/entitlements/keys:
    get:
      tags: [entitlements]
      summary: Published verification keys (for snapshot verification)
      security: []
      responses:
        "200": { description: Key set }
  /v1/usage/check:
    post: { tags: [usage], summary: Check quota, responses: { "401": { $ref: "#/components/responses/Unauthorized" } } }
  /v1/usage/reserve:
    post:
      tags: [usage]
      summary: Reserve usage
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      responses: { "401": { $ref: "#/components/responses/Unauthorized" }, "402": { description: Quota exceeded } }
  /v1/usage/commit:
    post:
      tags: [usage]
      summary: Commit reserved/direct usage
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      responses: { "401": { $ref: "#/components/responses/Unauthorized" } }
  /v1/usage/release:
    post: { tags: [usage], summary: Release a reservation, responses: { "401": { $ref: "#/components/responses/Unauthorized" } } }
  /v1/usage/current:
    get: { tags: [usage], summary: Current usage totals, responses: { "401": { $ref: "#/components/responses/Unauthorized" } } }
  /v1/checkout:
    post:
      tags: [checkout]
      summary: Create a Stripe Checkout session
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CheckoutCreateRequest" }
      responses:
        "200":
          description: Redirect URL (does NOT activate entitlements)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CheckoutCreateResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { description: No active checkout plan matched the request }
        "422": { description: Checkout request validation failed }
  /v1/webhooks/stripe:
    post:
      tags: [webhooks]
      summary: Stripe webhook receiver (signature-verified; idempotent processing)
      security: []
      responses:
        "200":
          description: Acknowledged and stored or deduped
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StripeWebhookResponse" }
        "400": { description: Invalid signature }
  /v1/admin/customers:
    get:
      tags: [admin]
      summary: List customers (operator read; Forge Command console)
      security: [{ adminAuth: [] }]
      parameters:
        - { name: email, in: query, required: false, schema: { type: string } }
        - name: status
          in: query
          required: false
          schema: { type: string, enum: [pending, active, suspended, closed, anonymized] }
        - { name: limit, in: query, required: false, schema: { type: integer, default: 25, maximum: 100 } }
        - { name: offset, in: query, required: false, schema: { type: integer, default: 0 } }
      responses:
        "200": { description: "Customer list (id, type, display name, status, primary email)" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /v1/admin/customers/{id}/suspend:
    post:
      tags: [admin]
      summary: Suspend a customer (requires `admin` role; reason required; idempotent)
      security: [{ adminAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/PathId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdminReasonRequest" }
      responses:
        "200": { description: "Status outcome { customer_id, from_status, status, changed }" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: Customer not found }
        "422": { description: Reason validation failed }
  /v1/admin/customers/{id}/restore:
    post:
      tags: [admin]
      summary: Restore a customer (requires `admin` role; reason required; idempotent)
      security: [{ adminAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/PathId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdminReasonRequest" }
      responses:
        "200": { description: "Status outcome { customer_id, from_status, status, changed }" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: Customer not found }
  /v1/admin/subscriptions/{id}/resync:
    post:
      tags: [admin]
      summary: Resync a subscription from Stripe (requires `admin` role)
      description: >
        Pulls current subscription truth from the Stripe API, reprojects it, syncs the
        linked license, and writes operator-actor audit. Sets the projection's event
        watermark to now so stale out-of-order webhooks are skipped afterwards.
      security: [{ adminAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/PathId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdminReasonRequest" }
      responses:
        "200": { description: "Resync outcome { subscription_id, status, changed, license_change }" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: Subscription not found (locally or at Stripe) }
        "503": { description: Stripe unavailable }
  /v1/admin/licenses:
    post:
      tags: [admin]
      summary: Issue an operator license (requires `admin` role)
      security: [{ adminAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [customer_id, reason]
              properties:
                customer_id: { type: string, format: uuid }
                product_key: { type: ["string", "null"], default: authorforge }
                device_limit: { type: ["integer", "null"], default: 1, minimum: 0, maximum: 10000 }
                expires_at: { type: ["string", "null"], format: date-time }
                reason: { type: string, minLength: 3, maxLength: 500 }
      responses:
        "200": { description: Issued license }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: Customer or product not found }
        "422": { description: Validation failed }
  /v1/admin/licenses/{id}/revoke:
    post:
      tags: [admin]
      summary: Revoke a license (requires `admin` role; reason required; idempotent)
      description: >
        Sets the license to revoked and writes an explicit license_revocations record;
        revocation blocks activation and leases and is never lifted by subscription sync.
      security: [{ adminAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/PathId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdminReasonRequest" }
      responses:
        "200": { description: "Revocation outcome { license_id, status, changed }" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: License not found }
  /v1/admin/entitlements/override:
    post:
      tags: [admin]
      summary: Set or clear an entitlement override (requires `admin` role)
      description: >
        Provide exactly one of feature_key / quota_key. A value sets the override
        (deactivating prior active overrides for the same key); omitting the value (or
        sending null) clears the key back to plan/grant evaluation.
      security: [{ adminAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [customer_id, reason]
              properties:
                customer_id: { type: string, format: uuid }
                product_key: { type: ["string", "null"], default: authorforge }
                feature_key: { type: ["string", "null"] }
                quota_key: { type: ["string", "null"] }
                value:
                  type: ["boolean", "number", "string", "null"]
                  description: Omit/null to clear the override(s) for the key.
                expires_at: { type: ["string", "null"], format: date-time }
                reason: { type: string, minLength: 3, maxLength: 500 }
      responses:
        "200": { description: "Override outcome { override_id, cleared_overrides, key }" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: Customer or product not found }
        "422": { description: Validation failed }
  /v1/admin/usage/adjust:
    post:
      tags: [admin]
      summary: Append a compensating usage adjustment (requires `admin` role)
      description: >
        Appends a signed adjustment event to the append-only usage ledger and folds it
        into the period total. Requires Idempotency-Key; replays return the original
        event without re-applying. Corrections are compensating events, never edits.
      security: [{ adminAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [customer_id, meter_key, amount, reason]
              properties:
                customer_id: { type: string, format: uuid }
                meter_key: { type: string, examples: ["cloud_tokens"] }
                amount:
                  type: number
                  description: Signed, non-zero; negative amounts compensate prior usage.
                period_key: { type: ["string", "null"], description: "YYYY-MM; defaults to the current month." }
                reason: { type: string, minLength: 3, maxLength: 500 }
      responses:
        "200": { description: "Adjustment outcome { usage_event_id, amount, replayed }" }
        "400": { description: Missing Idempotency-Key }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: Customer or meter not found }
        "422": { description: Validation failed }
  /v1/admin/audit:
    get:
      tags: [admin]
      summary: Read commercial audit events (operator read)
      security: [{ adminAuth: [] }]
      parameters:
        - { name: customer_id, in: query, required: false, schema: { type: string, format: uuid } }
        - { name: event_type, in: query, required: false, schema: { type: string } }
        - { name: limit, in: query, required: false, schema: { type: integer, default: 50, maximum: 200 } }
      responses:
        "200": { description: "Audit events, newest first" }
        "401": { $ref: "#/components/responses/Unauthorized" }
components:
  securitySchemes:
    customerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase-issued customer JWT
    adminAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Operator JWT from the admin issuer (separate from customer auth)
  parameters:
    PathId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema: { type: string }
  responses:
    Unauthorized:
      description: Authentication failed
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: Authenticated but not permitted (or suspended)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
  schemas:
    AccountProvisionRequest:
      type: object
      additionalProperties: false
      properties:
        display_name: { type: ["string", "null"], maxLength: 120 }
        country_code:
          type: ["string", "null"]
          description: Two-letter ISO country code; normalized to uppercase.
        timezone: { type: ["string", "null"], maxLength: 80 }
    AccountProvisionResponse:
      type: object
      required: [customer_id, auth_user_id, customer_type, status, created]
      properties:
        customer_id: { type: string, format: uuid }
        auth_user_id: { type: string, format: uuid }
        customer_type: { type: string, examples: ["individual"] }
        display_name: { type: ["string", "null"] }
        status: { type: string, examples: ["active"] }
        country_code: { type: ["string", "null"] }
        timezone: { type: ["string", "null"] }
        created:
          type: boolean
          description: True when this request inserted the profile; false when it returned an existing one.
    CheckoutCreateRequest:
      type: object
      additionalProperties: false
      required: [plan_key, success_url, cancel_url]
      properties:
        product_key:
          type: ["string", "null"]
          default: authorforge
        plan_key:
          type: string
          examples: ["authorforge_pro"]
        success_url:
          type: string
          format: uri
        cancel_url:
          type: string
          format: uri
    CheckoutCreateResponse:
      type: object
      required: [checkout_session_id, stripe_checkout_session_id, checkout_url, status]
      properties:
        checkout_session_id: { type: string, format: uuid }
        stripe_checkout_session_id: { type: string, examples: ["cs_test_123"] }
        checkout_url: { type: string, format: uri }
        status: { type: string, examples: ["created"] }
    License:
      type: object
      required: [id, product_key, status, device_limit, active_devices, issued_at]
      properties:
        id: { type: string, format: uuid }
        product_key: { type: string, examples: ["authorforge"] }
        status: { type: string, enum: [active, suspended, revoked, expired] }
        device_limit: { type: integer, minimum: 0 }
        active_devices: { type: integer, minimum: 0 }
        subscription_id: { type: ["string", "null"], format: uuid }
        issued_at: { type: string, format: date-time }
        expires_at: { type: ["string", "null"], format: date-time }
    Installation:
      type: object
      required: [id, install_key, product_key, status, created_at]
      properties:
        id: { type: string, format: uuid }
        install_key: { type: string }
        product_key: { type: string }
        app_version: { type: ["string", "null"] }
        status: { type: string, enum: [active, deactivated] }
        device_id: { type: ["string", "null"], format: uuid }
        last_heartbeat_at: { type: ["string", "null"], format: date-time }
        created_at: { type: string, format: date-time }
    Device:
      type: object
      required: [id, public_key, public_key_fpr, status, created_at]
      properties:
        id: { type: string, format: uuid }
        public_key:
          type: string
          description: Base64 Ed25519 public key registered by the client.
        public_key_fpr:
          type: string
          description: SHA-256 hex fingerprint of the raw public key bytes.
        label: { type: ["string", "null"] }
        status: { type: string, enum: [active, revoked] }
        created_at: { type: string, format: date-time }
    InstallationRegisterRequest:
      type: object
      additionalProperties: false
      required: [install_key]
      properties:
        install_key:
          type: string
          minLength: 8
          maxLength: 120
          pattern: "^[A-Za-z0-9._:-]+$"
          description: Client-generated stable key; registration is idempotent on it.
        product_key:
          type: ["string", "null"]
          default: authorforge
        app_version: { type: ["string", "null"], maxLength: 64 }
        device_public_key:
          type: ["string", "null"]
          description: Base64-encoded 32-byte Ed25519 public key (private key stays client-side).
        device_label:
          type: ["string", "null"]
          maxLength: 80
          description: Optional device label; requires device_public_key.
    InstallationRegisterResponse:
      type: object
      required: [installation_id, install_key, product_key, status, created, reactivated]
      properties:
        installation_id: { type: string, format: uuid }
        install_key: { type: string }
        product_key: { type: string }
        app_version: { type: ["string", "null"] }
        status: { type: string, enum: [active] }
        device_id: { type: ["string", "null"], format: uuid }
        created:
          type: boolean
          description: True when this request inserted the installation row.
        reactivated:
          type: boolean
          description: True when this request reactivated a deactivated installation.
    InstallationActivateResponse:
      type: object
      required:
        [activation_id, license_id, installation_id, activated_at, device_limit,
         active_devices, already_active]
      properties:
        activation_id: { type: string, format: uuid }
        license_id: { type: string, format: uuid }
        installation_id: { type: string, format: uuid }
        activated_at: { type: string, format: date-time }
        device_limit: { type: integer, minimum: 0 }
        active_devices: { type: integer, minimum: 0 }
        already_active:
          type: boolean
          description: True when the pairing was already active (idempotent re-activation).
    AdminReasonRequest:
      type: object
      additionalProperties: false
      required: [reason]
      properties:
        reason:
          type: string
          minLength: 3
          maxLength: 500
          description: Written justification; recorded in the commercial audit trail.
    EntitlementCheckRequest:
      type: object
      additionalProperties: false
      properties:
        product_key:
          type: ["string", "null"]
          default: authorforge
        feature_key:
          type: ["string", "null"]
          description: Check a feature. Provide exactly one of feature_key / quota_key.
          examples: ["authorforge.cloud.enabled"]
        quota_key:
          type: ["string", "null"]
          description: Check a quota meter.
          examples: ["cloud_tokens.monthly"]
        amount:
          type: ["number", "null"]
          default: 0
          description: >
            For quota checks, the amount about to be consumed; 0 asks "is this meter
            currently within quota".
    EntitlementCheckResponse:
      type: object
      required: [kind, key, allowed]
      properties:
        kind: { type: string, enum: [feature, quota] }
        key: { type: string }
        allowed:
          type: boolean
          description: Fails closed — absent features and over-quota meters are false.
        value:
          type: ["boolean", "number", "string", "null"]
          description: Present for feature checks.
        limit: { type: ["number", "null"], description: Present for quota checks. }
        used: { type: ["number", "null"] }
        reserved: { type: ["number", "null"] }
        remaining_before: { type: ["number", "null"] }
        requested: { type: ["number", "null"] }
        reason: { type: ["string", "null"] }
    StripeWebhookResponse:
      type: object
      required: [received, duplicate, event_id, event_type, status]
      properties:
        received:
          type: boolean
          description: True when this delivery inserted a new webhook receipt.
        duplicate:
          type: boolean
          description: True when this Stripe event id was already recorded.
        event_id: { type: string, examples: ["evt_123"] }
        event_type: { type: string, examples: ["customer.subscription.updated"] }
        status:
          type: string
          enum: [received, ignored, processed, failed]
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string, examples: ["CUSTOMER_SUSPENDED"] }
            message: { type: string }
            correlation_id: { type: ["string", "null"] }
            details: { type: object }
security:
  - customerAuth: []
