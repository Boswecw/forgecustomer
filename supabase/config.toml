# Supabase local configuration for the ForgeCustomer project.
# This project is DEDICATED to ForgeCustomer (separate from any other product DB).
project_id = "forgecustomer"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.migrations]
# One canonical migration system lives under supabase/migrations.
schema_paths = []

[studio]
enabled = true
port = 54323

[auth]
enabled = true
# ForgeCustomer trusts Supabase-issued JWTs; it keeps its own business customer id.
site_url = "http://localhost:3000"
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.email]
enable_signup = true
enable_confirmations = true
